<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéDex • Encuentra tu Pokémon</title>

  <!-- Favicon: pokeball SVG inline como data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231a1c2e' stroke='%23ffcb05' stroke-width='4'/%3E%3Cpath d='M2 50 Q2 2 50 2 Q98 2 98 50Z' fill='%23cc0000'/%3E%3Crect x='2' y='46' width='96' height='8' fill='%23ffcb05'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%231a1c2e' stroke='%23ffcb05' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23ffffff'/%3E%3C/svg%3E" />

  <!-- Estilos externos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Notificación flotante (Toast) ──────────────────────────────────── -->
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div id="toastMsg" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastText"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Cerrar"></button>
      </div>
    </div>
  </div>

  <!-- ── Figuras decorativas de fondo ───────────────────────────────────── -->
  <div class="bg-deco bg-pokeball-tr" aria-hidden="true"></div>
  <div class="bg-deco bg-pokeball-bl" aria-hidden="true"></div>
  <div class="bg-deco bg-ring-mid"    aria-hidden="true"></div>
  <div class="bg-deco bg-diamond-1"   aria-hidden="true"></div>
  <div class="bg-deco bg-diamond-2"   aria-hidden="true"></div>
  <div class="bg-deco bg-dots"        aria-hidden="true"></div>

  <!-- ── Contenido principal ────────────────────────────────────────────── -->
  <main class="container py-5">

    <!-- Cabecera -->
    <header class="text-center mb-5">
      <h1 class="pokedex-title">Pokédex</h1>
      <p class="subtitle">Busca y guarda tus Pokémon favoritos</p>
    </header>

    <!-- Buscador -->
    <section aria-label="Buscador de Pokémon">
      <div class="row justify-content-center mb-5">
        <div class="col-md-6">
          <div class="search-wrapper" role="search">
            <input
              id="input"
              type="search"
              class="search-input"
              placeholder="Nombre o número... (ej: pikachu, 25)"
              autocomplete="off"
              aria-label="Buscar Pokémon por nombre o número"
            />
            <button class="search-btn" id="btnBuscar" aria-label="Buscar">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11"/>
              </svg>
              Buscar
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Card de resultado -->
    <section aria-label="Resultado de búsqueda">
      <div class="row justify-content-center mb-5">
        <div class="col-md-5" id="resultWrapper" hidden>

          <article class="poke-result-card" id="pokeResultCard">

            <!-- Spinner de carga -->
            <div id="loadingSpinner" class="text-center py-5" hidden>
              <div class="pokeball-spinner" role="status" aria-label="Buscando Pokémon"></div>
              <p class="mt-3 text-muted">Buscando Pokémon...</p>
            </div>

            <!-- Datos del Pokémon -->
            <div id="pokeData" hidden>
              <div class="poke-card-header" id="pokeCardHeader">
                <span class="poke-number" id="pokeNumber"></span>
                <h2 class="poke-name"     id="pokeName"></h2>
                <div class="poke-types"   id="pokeTypes"></div>
              </div>

              <div class="poke-card-body">
                <img id="pokeImg" src="" alt="" class="poke-main-img" />
                <div class="poke-stats" id="pokeStats"></div>
              </div>

              <div class="poke-card-footer">
                <button class="btn-save" id="btnFavoritos">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M2 2v13.5a.5.5 0 0 0 .74.439L8 13.069l5.26 2.87A.5.5 0 0 0 14 15.5V2a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2"/>
                  </svg>
                  Guardar en Favoritos
                </button>
              </div>
            </div>

          </article>
        </div>
      </div>
    </section>

    <!-- Sección de favoritos -->
    <section aria-label="Mis favoritos">

      <div class="section-divider" role="separator">
        <span>Mis Favoritos</span>
      </div>

      <!-- Controles de favoritos -->
      <div class="d-flex justify-content-between align-items-center mb-4" id="favoritosHeader" hidden>
        <span class="fav-count" id="favCount" aria-live="polite"></span>
        <button class="btn-clear" id="btnEliminarTodos">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
            <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
          </svg>
          Eliminar todos
        </button>
      </div>

      <!-- Grid de favoritos -->
      <div id="mostrarFavoritos" class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3" aria-label="Lista de favoritos"></div>

      <!-- Estado vacío -->
      <div id="emptyFavoritos" class="empty-state" role="status">
        <div class="empty-pokeball" aria-hidden="true"></div>
        <p>No hay Pokémon guardados todavía</p>
      </div>

    </section>

  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
